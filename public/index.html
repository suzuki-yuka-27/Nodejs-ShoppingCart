<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="css/style.css">

    <title>商品一覧</title>
</head>

<body>
    <div class="product-header">
        <h1>商品一覧</h1>
        <img src="images/cart_icon.png" alt="ショッピングカートアイコン" class="cart-icon">
    </div>
    <div class="search-section">
        <label for="search">
            商品を検索
        </label>
        <div class="search-box">
            <input id="search" type="text" placeholder="商品を入力">
            <button id="search-button">
                <img src="images/search_icon.png" alt="検索アイコン" class="search-icon">
            </button>
        </div>
    </div>
    <div class="product-list">
    </div>
    <button>注文する</button>
</body>

</html>

</html>
