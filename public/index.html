<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="css/style.css">

    <title>商品一覧</title>
</head>

<body>
    <section>
        <h1>商品一覧</h1>
        <div id="search-section">
            <label for="search-input">
                商品を検索
            </label>
            <div id="search-box">
                <input id="search-input" type="text" placeholder="商品を入力">
                <button id="search-button">
                    <img src="images/search_icon.png" alt="検索アイコン" id="search-icon">
                </button>
            </div>
        </div>
        <div id="product-list">
        </div>
    </section>

    <section>
        <h1>カート</h1>
        <div id="cart-list">
        </div>
        <b class="total-amount"></b>
    </section>

    <section>
        <h1>注文</h1>
        <div id="order-list">
            <h2>商品</h2>
        </div>
        <b class="total-amount"></b>
        <button id="order-button">注文する</button>
    </section>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="js/app.js"></script>
</body>

</html>

</html>
